# macOS-specific tmux settings
# Loaded automatically on macOS via source-if-exists in tmux.conf

# Fix clipboard integration
# Modern tmux (3.2+) doesn't need reattach-to-user-namespace
# Use pbcopy/pbpaste directly
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Fix macOS open command in tmux
set -g default-command "${SHELL}"
