# =============================================================================
# env-setup configuration — fully commented reference
# =============================================================================
#
# Copy this file to config.yaml and customise as needed.
# Every option shown below is the DEFAULT value; you only need to include
# lines you want to change.
#
# Booleans: true / false
# Strings:  quoted ("lts", "3.12")
# Lists:    YAML sequences (- item)
# =============================================================================

# -----------------------------------------------------------------------------
# General behaviour
# -----------------------------------------------------------------------------
general:
  # Skip all interactive prompts and assume "yes"
  auto_yes: true

  # Print what *would* be done without making any changes
  dry_run: false

  # Back up existing dotfiles before overwriting (~/.config/env-setup/backups/)
  backup: true

# -----------------------------------------------------------------------------
# Core toolchain — installed first because later modules depend on them
# -----------------------------------------------------------------------------
core:
  # macOS: install Homebrew; Linux: ensure apt is up to date
  homebrew: true

  # Configure git defaults (user, aliases, delta pager)
  git: true

  # Install the GitHub CLI (gh)
  github_cli: true

  # macOS: Xcode Command Line Tools; Linux: build-essential, cmake, pkg-config
  build_tools: true

# -----------------------------------------------------------------------------
# Programming languages
# -----------------------------------------------------------------------------
languages:
  node:
    # Install Node.js via nvm (Node Version Manager)
    enabled: true
    # Version: "lts", "latest", or a specific version like "20.11.0"
    version: "lts"

  python:
    # Install Python via pyenv
    enabled: true
    # Version: any version string supported by pyenv (e.g. "3.12", "3.11.7")
    version: "3.12"

  conda:
    # Install Miniconda — disabled by default (use pyenv + venv instead)
    enabled: false

# -----------------------------------------------------------------------------
# Python ecosystem tools (installed only when languages.python.enabled is true)
# -----------------------------------------------------------------------------
python_tools:
  # JupyterLab — interactive notebooks
  jupyter: true

  # Poetry — dependency management & packaging
  poetry: true

  # uv — ultra-fast pip replacement from Astral
  uv: true

# -----------------------------------------------------------------------------
# Docker
# -----------------------------------------------------------------------------
docker:
  # Install Docker Engine (Linux) or Docker Desktop (macOS)
  enabled: true

# -----------------------------------------------------------------------------
# CLI tools — modern Unix replacements and productivity utilities
# -----------------------------------------------------------------------------
cli_tools:
  # fzf — fuzzy finder for files, history, and more
  fzf: true

  # ripgrep (rg) — blazing-fast recursive grep
  ripgrep: true

  # bat — cat with syntax highlighting and line numbers
  bat: true

  # fd — user-friendly alternative to find
  fd: true

  # eza — modern replacement for ls (colours, icons, git status)
  eza: true

  # zoxide (z) — smarter cd that learns your habits
  zoxide: true

  # jq — command-line JSON processor
  jq: true

  # btop — resource monitor (CPU, RAM, disk, network)
  btop: true

  # tldr — simplified man pages with practical examples
  tldr: true

  # tree — directory listing in tree format
  tree: true

  # httpie (http/https) — human-friendly HTTP client
  httpie: true

# -----------------------------------------------------------------------------
# Shell — Zsh + Oh My Zsh + Powerlevel10k
# -----------------------------------------------------------------------------
shell:
  # Install zsh if not already present
  install_zsh: true

  # Change the default login shell to zsh (requires sudo on Linux)
  set_default_shell: true

  # Install Oh My Zsh framework
  oh_my_zsh: true

  # Install the Powerlevel10k prompt theme
  powerlevel10k: true

  plugins:
    # Oh My Zsh built-in plugins (no installation needed — bundled with OMZ).
    # Full list: https://github.com/ohmyzsh/ohmyzsh/wiki/Plugins
    builtin:
      # --- Core ---
      - git                       # git aliases (gst, gco, gp, ...) and helpers
      - web-search                # search Google/DuckDuckGo from the terminal
      - extract                   # `extract <archive>` handles any format

      # --- Quality-of-life ---
      - sudo                      # double-tap ESC to prepend `sudo` to current line
      - history-substring-search  # fish-like history: type prefix, press up/down
      - colored-man-pages         # colourise `man` output
      - command-not-found         # suggest apt package when command is missing (Linux)
      - copybuffer                # Ctrl+O copies the current command line to clipboard
      - copypath                  # `copypath` copies $PWD (or a file path) to clipboard
      - dirhistory                # Alt+left/right for dir history, Alt+up/down for parent/child
      - safe-paste                # prevent multi-line paste from auto-executing

      # --- Tooling completions (match what this repo installs) ---
      - docker                    # docker completion + aliases
      - docker-compose            # docker-compose completion + aliases
      - gh                        # GitHub CLI completion
      - fzf                       # wires Ctrl+R / Ctrl+T / Alt+C key bindings to fzf

      # --- Optional extras you may want to enable manually ---
      # - aliases                 # `acs` lists all aliases grouped by plugin
      # - npm                     # npm completion + aliases (heavy first-run cost)
      # - pip                     # pip completion (slow on Python startup)
      # - poetry                  # poetry completion
      # - tmux                    # tmux helpers + auto-attach
      # - kubectl                 # kubectl completion
      # - vscode                  # `vsc` shortcut + project helpers

    # Third-party plugins (cloned into $ZSH_CUSTOM/plugins/).
    # Two accepted forms:
    #   - "name"        -> defaults to github.com/zsh-users/<name>
    #   - "owner/repo"  -> github.com/<owner>/<repo>
    external:
      # --- The classic zsh-users baseline (still the standard in 2026) ---
      - zsh-autosuggestions       # fish-like inline suggestions (Ctrl+right to accept)
      - zsh-syntax-highlighting   # real-time command colouring (must load LAST in plugins list)
      - zsh-completions           # extra completion definitions

      # --- Modern additions (require owner/repo form) ---
      - Aloxaf/fzf-tab            # fzf-powered interactive Tab completion
      - MichaelAquilina/zsh-you-should-use  # reminds you when an alias exists

      # --- Mutually-exclusive alternatives — pick one path, do not enable both ---
      # - zdharma-continuum/fast-syntax-highlighting  # faster replacement for zsh-syntax-highlighting
      # - marlonrichert/zsh-autocomplete              # real-time dropdown (conflicts with zsh-autosuggestions style)

# -----------------------------------------------------------------------------
# tmux — terminal multiplexer
# -----------------------------------------------------------------------------
tmux:
  # Install tmux
  enabled: true

  # Install TPM (Tmux Plugin Manager)
  tpm: true

  # Run TPM install automatically after setting up .tmux.conf
  auto_install_plugins: true

# -----------------------------------------------------------------------------
# Claude Code — AI-powered coding assistant CLI
# Installed via native installer (no Node.js dependency)
# https://code.claude.com/docs/setup
#
# In addition to installing the CLI, this module syncs personal Claude Code
# configuration from configs/claude/ in this repo onto the machine, so the
# same setup follows you across hosts. The mapping is:
#
#   configs/claude/CLAUDE.md            -> ~/.claude/CLAUDE.md
#   configs/claude/rules/*.md           -> ~/.claude/rules/
#   configs/claude/commands/*.md        -> ~/.claude/commands/
#   configs/claude/agents/*.md          -> ~/.claude/agents/
#   configs/claude/settings.json        -> ~/.claude/settings.json  (whitelisted merge)
#   configs/claude/mcp-servers.json     -> ~/.claude.json mcpServers field (jq merge)
#
# Marketplaces listed under `marketplaces:` are registered via
# `claude plugin marketplace add` so enabledPlugins entries can resolve.
# -----------------------------------------------------------------------------
claude_code:
  enabled: true

  # ccstatusline — status line formatter for Claude Code
  # https://github.com/sirmalloc/ccstatusline
  # Runs on demand via `npx -y ccstatusline@latest`, so no package install
  # is performed here. The widget template is deployed to
  # ~/.config/ccstatusline/settings.json; the corresponding statusLine block
  # in ~/.claude/settings.json is handled by the unified settings merge below.
  ccstatusline:
    enabled: true

  # ---------------------------------------------------------------------------
  # Personal config sync — all flags are independent so individual pieces can
  # be disabled per machine if needed.
  # ---------------------------------------------------------------------------

  # Deploy ~/.claude/CLAUDE.md from configs/claude/CLAUDE.md
  # (global instructions: communication, hard rules, commit conventions)
  sync_global_md: true

  # Deploy ~/.claude/rules/*.md from configs/claude/rules/
  # (full Conventional Commits spec, etc.)
  sync_rules: true

  # Deploy ~/.claude/commands/*.md from configs/claude/commands/
  # (custom slash commands such as /init-rules)
  sync_commands: true

  # Deploy ~/.claude/agents/*.md from configs/claude/agents/
  # (custom subagent definitions — directory may be empty)
  sync_agents: true

  # Whitelist of top-level keys to merge from configs/claude/settings.json into
  # ~/.claude/settings.json. Keys not listed here are preserved verbatim on the
  # machine (useful for experimental or auth-related fields). The merge is
  # idempotent and creates a timestamped backup before any mutation.
  settings_merge_keys:
    - env
    - statusLine
    - enabledPlugins
    - skipDangerousModePermissionPrompt
    - teammateMode

  # Register plugin marketplaces via `claude plugin marketplace add`.
  # Without these, enabledPlugins entries cannot resolve to real plugins.
  # Idempotent — already-registered marketplaces are skipped.
  # Note: `claude-plugins-official` is auto-available in every Claude Code
  # session and is included here as a safety net (the registration is a no-op
  # if already present).
  register_marketplaces: true
  marketplaces:
    - anthropics/claude-plugins-official
    - obra/superpowers-marketplace

  # Explicitly install every plugin marked `true` in configs/claude/settings.json
  # via `claude plugin install`. Required on a fresh machine — without this,
  # enabledPlugins entries are referenced but the plugins are never downloaded.
  # Idempotent: skips plugins already in ~/.claude/plugins/installed_plugins.json.
  install_enabled_plugins: true

  # Sync user-scoped MCP servers from configs/claude/mcp-servers.json into
  # ~/.claude.json's mcpServers field. The source file is a placeholder
  # ({"mcpServers": {}}) until you start adding entries; this hook is wired
  # up now so future `claude mcp add` workflows can be persisted by simply
  # committing the change.
  sync_mcp_servers: true

# -----------------------------------------------------------------------------
# User directories — create personal folders under $HOME
# -----------------------------------------------------------------------------
user_dirs:
  # Create the directories listed below
  enabled: true

  # Paths are always relative to $HOME. Nested paths like
  # "Documents/repositories" are created in a single mkdir -p call.
  paths:
    - Documents
    - Downloads
    - Tools
    - Documents/repositories

# -----------------------------------------------------------------------------
# Windows / PowerShell — native Windows engine (ignored by setup.sh; read by
# setup.ps1). Has no effect on macOS/Linux/WSL runs.
# -----------------------------------------------------------------------------
windows:
  # Configure Windows Terminal (font, color scheme, default profile) via a
  # whitelisted settings.json merge. Set false to leave Windows Terminal alone.
  windows_terminal: true

  # Also assemble a Windows PowerShell 5.1 profile (default: only pwsh 7).
  powershell5_profile: false

  powershell:
    # PowerShell modules installed from PSGallery. PSReadLine is built in;
    # listed here only if you want it pinned/updated.
    modules:
      - Terminal-Icons          # file-type icons in Get-ChildItem
      - PSFzf                   # fzf Ctrl+R / Ctrl+T bindings
      - posh-git                # git status + completion

    # Oh My Posh theme file deployed from configs/omp/ (basename only).
    omp_theme: "envsetup.omp.json"

  multiplexer:
    # zellij — the tmux role on native Windows.
    zellij: true

# -----------------------------------------------------------------------------
# Worklog — cross-machine work-log capture (curation on trusted machines only)
# -----------------------------------------------------------------------------
# Capture-at-source pipeline: every machine appends raw daily logs to a private
# inbox repo; trusted "curator" machines fold them into the obsidian vault.
# Per-machine values (role, source) belong in config.local.yaml.
worklog:
  # Master switch for this machine.
  enabled: true

  # Machine role — default "capture" is the safe, least-privilege choice:
  #   capture — clone the inbox + deploy /worklog only (work / shared servers).
  #   curator — ALSO clone the obsidian vault + deploy /worklog-sync. Trusted
  #             machines only; the vault never lands on a capture machine.
  # curator is NEVER a default — set it per-machine in config.local.yaml.
  role: capture

  # This machine's label (its source folder in the inbox). "auto" derives it
  # from the short hostname; override to a friendly name in config.local.yaml.
  source: auto

  # Inbox repo (raw logs) — owner/name slug. The module picks HTTPS or the
  # github-worklog SSH remote based on the detected GitHub auth. Paths are
  # $HOME-relative (or absolute if they start with "/").
  inbox_repo: "bolin8017/worklog-inbox"
  inbox_path: "Documents/repositories/worklog-inbox"

  # Obsidian vault (curated notes) — used only when role: curator.
  vault_repo: "bolin8017/obsidian-notes"
  vault_path: "Documents/obsidian-notes"
