name: PR Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  shellcheck-review:
    name: ShellCheck Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck with reviewdog
        uses: reviewdog/action-shellcheck@v1
        with:
          reporter: github-pr-review
          shellcheck_flags: "-x"
          pattern: "*.sh"
          path: "."
          fail_on_error: false

  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review
          fail_on_error: false

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run tests and capture output
        id: tests
        run: |
          output=$(bash tests/run_all.sh 2>&1) || true
          # Strip ANSI codes for the summary
          clean=$(echo "$output" | sed 's/\x1b\[[0-9;]*m//g')
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$clean" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if echo "$clean" | grep -q "ALL TESTS PASSED"; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post test summary as PR comment
        uses: actions/github-script@v7
        env:
          TEST_PASSED: ${{ steps.tests.outputs.passed }}
          TEST_RESULT: ${{ steps.tests.outputs.result }}
        with:
          script: |
            const passed = process.env.TEST_PASSED === 'true';
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'ALL TESTS PASSED' : 'SOME TESTS FAILED';
            const output = process.env.TEST_RESULT || '';

            const lines = output.split('\n');
            const summaryLines = lines.filter(l =>
              l.includes('Passed:') || l.includes('Failed:') ||
              l.includes('Total:') || l.includes('Passed suites')
            );

            const body = [
              `## ${icon} Test Results: ${status}`,
              '',
              '```',
              summaryLines.join('\n'),
              '```',
              '',
              '<details>',
              '<summary>Full test output</summary>',
              '',
              '```',
              output.slice(-3000),
              '```',
              '',
              '</details>'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Test Results:')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
