name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck -x setup.sh uninstall.sh bootstrap.sh lib/*.sh modules/*.sh scripts/*.sh

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck (needed by test_shellcheck.sh)
        run: sudo apt-get install -y shellcheck

      - name: Run test suite
        run: bash tests/run_all.sh

  dry-run:
    name: Dry Run (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Run dry-run
        run: bash setup.sh --dry-run --auto-yes

      - name: Run uninstall dry-run
        run: bash uninstall.sh --dry-run --auto-yes

  yaml-validate:
    name: Validate YAML Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: config.yaml and config.yaml.example must be identical
        run: diff config.yaml config.yaml.example

      - name: Validate YAML syntax
        run: python3 -c "import yaml; yaml.safe_load(open('config.yaml.example'))"

  powershell-lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $targets = @('setup.ps1','uninstall.ps1','bootstrap.ps1') +
                     (Get-ChildItem lib -Filter *.psm1 -ErrorAction Ignore).FullName +
                     (Get-ChildItem modules -Filter *.ps1 -ErrorAction Ignore).FullName +
                     (Get-ChildItem scripts -Filter *.ps1 -ErrorAction Ignore).FullName
          $targets = $targets | Where-Object { $_ }   # drop nulls (e.g. no modules/*.ps1 yet)
          $results = $targets | ForEach-Object { Invoke-ScriptAnalyzer -Path $_ -Settings ./PSScriptAnalyzerSettings.psd1 -Severity Error,Warning }
          if ($results) { $results | Format-Table -AutoSize; throw "PSScriptAnalyzer found $($results.Count) issue(s)" }
          Write-Host 'PSScriptAnalyzer clean'

  powershell-tests:
    name: Pester
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck -MinimumVersion 5.5.0

      - name: Run Pester
        shell: pwsh
        run: |
          $r = Invoke-Pester -Path tests -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) test(s) failed" }

  powershell-dry-run:
    name: Dry Run (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run dry-run
        shell: pwsh
        run: ./setup.ps1 -DryRun -AutoYes

      - name: Run uninstall dry-run
        shell: pwsh
        run: ./uninstall.ps1 -DryRun -AutoYes

  # Windows PowerShell 5.1 (Desktop) is the shell a pasted bootstrap one-liner runs
  # in, but every job above uses pwsh (Core) — so 5.1-only breakage (e.g. a .NET 6+
  # API like FileSystemInfo.ResolveLinkTarget) stays invisible. This lane runs the
  # suite and a dry-run under 5.1 to catch those regressions. `shell: powershell` is
  # Windows PowerShell 5.1 on windows runners; `shell: pwsh` is PowerShell 7.
  powershell5-tests:
    name: Pester + Dry Run (Windows PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester (Windows PowerShell 5.1)
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol =
            [Net.ServicePointManager]::SecurityProtocol -bor [Net.SecurityProtocolType]::Tls12
          Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck -MinimumVersion 5.5.0

      - name: Run Pester under Windows PowerShell 5.1
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $r = Invoke-Pester -Path tests -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) test(s) failed" }

      - name: Dry-run under Windows PowerShell 5.1
        shell: powershell
        run: |
          ./setup.ps1 -DryRun -AutoYes
          ./uninstall.ps1 -DryRun -AutoYes
